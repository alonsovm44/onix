name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows-x86_64
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: macos-13
            target: macos-x86_64

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --release
      - name: Rename Artifact
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/release/onix.exe dist/onix-${{ matrix.target }}.exe
          else
            cp target/release/onix dist/onix-${{ matrix.target }}
          fi
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
