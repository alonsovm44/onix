app:
  name: onix
  version: 0.1.0
build:
  entry: src/main.rs
  command: cargo build --release
  output_name: onix
targets:
- os: linux
  arch: amd64
- os: linux
  arch: arm64
- os: macos
  arch: arm64
- os: windows
  arch: amd64
install:
  file_type: binary
  target_dir: ~/.local/bin
  bin_name: onix
permissions:
- type: filesystem
  action: write
  path: ~/.local/bin
  variable: null
- type: environment
  action: modify
  path: null
  variable: PATH
